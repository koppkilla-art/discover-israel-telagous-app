<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Israel POC | Pure Map View</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <base href="./">

    <style>
        :root { --primary: #0038b8; --locked: #777; --unlocked: #27ae60; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        header { 
            background: var(--primary); color: white; padding: 10px; text-align: center; 
            z-index: 1001; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .admin-bar { 
            background: white; padding: 10px; display: flex; gap: 10px; 
            border-bottom: 1px solid #ddd; z-index: 1000; position: relative;
        }
        select { flex-grow: 1; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }

        #map { height: calc(100vh - 100px); width: 100%; z-index: 1; }

        /* Slide-up Detail Panel */
        #details-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; background: white; 
            height: 50vh; overflow-y: auto; padding: 20px; border-top: 5px solid var(--primary);
            z-index: 2000; box-shadow: 0 -5px 25px rgba(0,0,0,0.3); display: none;
            border-radius: 20px 20px 0 0;
        }

        .img-container { width: 100%; height: 200px; overflow: hidden; border-radius: 12px; margin: 15px 0; background: #000; }
        .location-image { width: 100%; height: 100%; object-fit: cover; }

        /* Pins */
        .custom-pin { width: 20px; height: 20px; border-radius: 50%; background: var(--locked); border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .custom-pin.active { background: var(--unlocked); transform: scale(1.2); box-shadow: 0 0 10px var(--unlocked); }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 1.1rem;">POC: MAP OVERRIDE</h1>
</header>

<div class="admin-bar">
    <select id="admin-trigger" onchange="unlockLocation(this.value)">
        <option value="">Admin: Force Unlock Site...</option>
    </select>
    <button onclick="location.reload()" style="padding:8px;">Reset</button>
</div>

<div id="map"></div>

<div id="details-panel">
    <button onclick="document.getElementById('details-panel').style.display='none'" style="float:right; padding:5px 15px;">Close</button>
    <h2 id="detail-title" style="color:var(--primary); margin-top:0;"></h2>
    <div class="img-container">
        <img id="detail-img" class="location-image" src="">
    </div>
    <p id="detail-desc" style="line-height:1.6; color:#333;"></p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const tourData = {
        'jerusalem': { name: 'Jerusalem', coords: [31.7683, 35.2137], desc: 'The spiritual heart of the world, home to the Western Wall and Temple Mount.', img: 'assets/images/jerusalem.jpg' },
        'capernaum': { name: 'Capernaum', coords: [32.8807, 35.5752], desc: 'Center of Jesus\'s ministry in Galilee. Ancient synagogue ruins.', img: 'assets/images/capernaum.jpg' },
        'sea-of-galilee': { name: 'Sea of Galilee', coords: [32.82, 35.58], desc: 'Freshwater lake where the disciples were called to be fishers of men.', img: 'assets/images/sea-of-galilee.jpg' },
        'magdala': { name: 'Magdala', coords: [32.8306, 35.5264], desc: 'Hometown of Mary Magdalene with an incredibly preserved 1st-century synagogue.', img: 'assets/images/magdala.jpg' },
        'en-gedi': { name: 'En-Gedi', coords: [31.4550, 35.3881], desc: 'A desert oasis near the Dead Sea where David hid from Saul.', img: 'assets/images/en-gedi.jpg' }
    };

    let map, markers = {}, unlocked = [];

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([31.8, 35.3], 8);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        const adminSelect = document.getElementById('admin-trigger');

        for (const key in tourData) {
            const icon = L.divIcon({ 
                className: '', 
                html: `<div id="pin-${key}" class="custom-pin"></div>`, 
                iconSize: [20, 20] 
            });

            const marker = L.marker(tourData[key].coords, { icon: icon }).addTo(map);
            marker.on('click', () => showContent(key));
            markers[key] = marker;

            let opt = document.createElement('option');
            opt.value = key;
            opt.innerText = tourData[key].name;
            adminSelect.appendChild(opt);
        }
    }

    function unlockLocation(key) {
        if(!key) return;
        unlocked.push(key);
        document.getElementById(`pin-${key}`).classList.add('active');
        showContent(key);
        map.flyTo(tourData[key].coords, 13);
    }

    function showContent(key) {
        document.getElementById('detail-title').innerText = tourData[key].name;
        document.getElementById('detail-desc').innerText = tourData[key].desc;
        document.getElementById('detail-img').src = tourData[key].img;
        document.getElementById('details-panel').style.display = 'block';
    }

    window.onload = initMap;
</script>
</body>
</html>
