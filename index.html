<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Israel Discovery</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { 
            --primary: #0038b8; 
            --bg: #f8f9fa; 
            --text: #1a1a1a; 
            --card-bg: #ffffff;
            --accent: #27ae60;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: "Inter", -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* --- TOP NAVIGATION / PROFILE --- */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: white; position: sticky; top: 0; z-index: 1000;
        }
        .logo-text { font-weight: 800; font-size: 1.2rem; color: var(--primary); letter-spacing: -0.5px; }
        .profile-icon { 
            width: 35px; height: 35px; background: #ddd; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer;
        }

        /* --- SEARCH & FILTER --- */
        .search-container { padding: 10px 20px; background: white; }
        .search-bar { 
            width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid #eee; 
            background: #f1f3f5; font-size: 14px; outline: none;
        }
        .filter-scroll { 
            display: flex; overflow-x: auto; padding: 15px 20px; gap: 10px; 
            scrollbar-width: none; background: white;
        }
        .filter-chip { 
            padding: 8px 18px; background: #eee; border-radius: 20px; 
            white-space: nowrap; font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .filter-chip.active { background: var(--primary); color: white; }

        /* --- CONTENT PAGES --- */
        .page { height: calc(100vh - 180px); overflow-y: auto; padding-bottom: 80px; }
        .hidden { display: none !important; }

        /* --- CATALOG CARDS --- */
        .adventure-grid { padding: 0 20px; }
        .adventure-card { 
            background: var(--card-bg); border-radius: 15px; overflow: hidden; 
            margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-tag { font-size: 10px; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        .card-title { margin: 5px 0; font-size: 16px; font-weight: 700; }
        .card-meta { font-size: 12px; color: #777; }

        /* --- MAP PAGE --- */
        #map { height: 100%; width: 100%; }

        /* --- BOTTOM NAVIGATION PANE --- */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: white; 
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #eee; z-index: 5000;
        }
        .nav-item { text-align: center; color: #999; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; font-weight: 600; }

        /* --- DETAIL OVERLAY --- */
        #detail-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 6000; display: none; overflow-y: auto;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-text">EXPEDITION</div>
    <div class="profile-icon" onclick="alert('Profile Settings')">👤</div>
</header>

<div id="page-home" class="page">
    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search routes, days, or experiences...">
    </div>
    <div class="filter-scroll">
        <div class="filter-chip active">All Adventures</div>
        <div class="filter-chip">Galilee</div>
        <div class="filter-chip">Judean Desert</div>
        <div class="filter-chip">Jerusalem</div>
        <div class="filter-chip">7-Day Routes</div>
    </div>

    <div class="adventure-grid" id="catalog">
        </div>
</div>

<div id="page-map" class="page hidden">
    <div id="map"></div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('home', this)">
        <i>🏠</i><span>Home</span>
    </div>
    <div class="nav-item" onclick="switchPage('map', this)">
        <i>📍</i><span>Map</span>
    </div>
    <div class="nav-item" onclick="alert('My Bookings')">
        <i>📅</i><span>Trips</span>
    </div>
    <div class="nav-item" onclick="alert('Support')">
        <i>💬</i><span>Support</span>
    </div>
</div>

<div id="detail-overlay">
    <button onclick="closeDetail()" style="margin: 20px; padding: 10px 20px; border-radius: 10px; border: none; background: var(--primary); color: white;">✕ Back</button>
    <div id="detail-view-content" style="padding: 20px;"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Adventure Data Catalog
    const adventures = [
        { id: 'galilee', tag: '3 DAYS', title: 'The Way of the Galilee', meta: 'Capernaum • Magdala • Sea of Galilee', img: 'https://images.unsplash.com/photo-1552353617-3bfd679b3bdd?w=600' },
        { id: 'desert', tag: '1 DAY', title: 'Judean Wilderness Escape', meta: 'En-Gedi • Jericho Road • Dead Sea', img: 'https://images.unsplash.com/photo-1590422941893-6a9787e95b05?w=600' },
        { id: 'jerusalem', tag: '5 DAYS', title: 'Eternal Jerusalem Deep-Dive', meta: 'Temple Mount • Mt of Olives • Old City', img: 'https://images.unsplash.com/photo-1547039916-d007c030307e?w=600' }
    ];

    let map;

    // Load Catalog
    function loadCatalog() {
        const container = document.getElementById('catalog');
        adventures.forEach(adv => {
            const card = document.createElement('div');
            card.className = 'adventure-card';
            card.onclick = () => openAdventure(adv);
            card.innerHTML = `
                <img src="${adv.img}" class="card-img">
                <div class="card-info">
                    <span class="card-tag">${adv.tag}</span>
                    <h3 class="card-title">${adv.title}</h3>
                    <p class="card-meta">${adv.meta}</p>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Navigation Logic
    function switchPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-' + pageId).classList.remove('hidden');
        
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');

        if(pageId === 'map') {
            setTimeout(initMap, 100); // Small delay to ensure container is visible
        }
    }

    function initMap() {
        if(map) { map.invalidateSize(); return; }
        map = L.map('map').setView([32.0, 35.0], 8);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
    }

    function openAdventure(adv) {
        const overlay = document.getElementById('detail-overlay');
        const content = document.getElementById('detail-view-content');
        content.innerHTML = `
            <img src="${adv.img}" style="width:100%; border-radius:15px;">
            <h1>${adv.title}</h1>
            <p>${adv.meta}</p>
            <hr>
            <p>This experience is currently being finalized. Once booked, this adventure will populate your interactive map with GPS triggers.</p>
        `;
        overlay.style.display = 'block';
    }

    function closeDetail() {
        document.getElementById('detail-overlay').style.display = 'none';
    }

    window.onload = loadCatalog;
</script>
</body>
</html>
