<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Israel Discovery | Sacred Steps</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <base href="./"> <style>
        :root { --primary: #0038b8; --bg: #f8f9fa; --white: #ffffff; --text: #1a1a1a; --accent: #27ae60; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Navigation Components */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: white; border-bottom: 1px solid #eee; z-index: 1000; }
        .app-title { font-weight: 800; font-size: 1.1rem; color: var(--primary); }
        
        .page { height: calc(100vh - 140px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; }

        /* Catalog Cards */
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; cursor: pointer; border: 1px solid #eee; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-content { padding: 15px; }

        /* Map UI */
        #map { height: 100%; width: 100%; }

        /* Bottom Tab Bar */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 10px 0 25px 0; border-top: 1px solid #eee; z-index: 5000; }
        .tab-item { flex: 1; text-align: center; color: #aaa; font-size: 10px; font-weight: 600; cursor: pointer; }
        .tab-item.active { color: var(--primary); }
        .tab-icon { font-size: 20px; display: block; }

        /* Contact Form Styling */
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Info Slide-up */
        #info-panel { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 50vh; z-index: 6000; border-radius: 25px 25px 0 0; padding: 25px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); display: none; }
    </style>
</head>
<body>

<header>
    <div class="app-title">SACRED STEPS</div>
    <div style="font-size: 1.2rem;">👤</div>
</header>

<div id="page-home" class="page">
    <h2 style="margin-top:0;">My Adventures</h2>
    <div class="card" onclick="activateTrip('galilee')">
        <img src="assets/images/sea-of-galilee.jpg" alt="Galilee">
        <div class="card-content">
            <span style="color:var(--accent); font-size:10px; font-weight:bold;">ACTIVE NOW</span>
            <h3 style="margin:5px 0;">The Way of the Galilee</h3>
            <p style="font-size:12px; color:#666; margin:0;">3 Days • 4 Locations Unlocked</p>
        </div>
    </div>
</div>

<div id="page-map" class="page hidden" style="padding:0;">
    <div id="map"></div>
</div>

<div id="page-contact" class="page hidden">
    <h2>Contact Us</h2>
    <p style="color:#666; margin-bottom:20px;">Questions about the tour? Send us a message.</p>
    
    <form action="https://formspree.io/f/your-form-id" method="POST" class="contact-form">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" rows="4" placeholder="How can we help?" required></textarea>
        <button type="submit" class="submit-btn">Send Message</button>
    </form>
</div>

<div class="tab-bar">
    <div class="tab-item active" onclick="nav('home', this)">
        <span class="tab-icon">🏠</span>Home
    </div>
    <div class="tab-item" onclick="nav('map', this)">
        <span class="tab-icon">📍</span>Map
    </div>
    <div class="tab-item" onclick="nav('contact', this)">
        <span class="tab-icon">📧</span>Contact
    </div>
</div>

<div id="info-panel">
    <button onclick="document.getElementById('info-panel').style.display='none'" style="float:right; border:none; background:#eee; border-radius:50%; width:30px; height:30px;">✕</button>
    <h2 id="info-title" style="margin:0 0 10px 0; color:var(--primary);"></h2>
    <img id="info-img" src="" style="width:100%; height:160px; object-fit:cover; border-radius:15px; margin-bottom:15px;">
    <p id="info-desc" style="font-size:14px; line-height:1.5; color:#444;"></p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const tourData = {
        'jerusalem': { name: 'Jerusalem', coords: [31.768, 35.213], desc: 'The spiritual heart of the world, home to thousands of years of biblical history.', img: 'assets/images/jerusalem.jpg' },
        'capernaum': { name: 'Capernaum', coords: [32.880, 35.575], desc: 'Jesus\'s base of operations in Galilee. Explore the ancient synagogue ruins.', img: 'assets/images/capernaum.jpg' },
        'sea-of-galilee': { name: 'Sea of Galilee', coords: [32.82, 35.58], desc: 'The freshwater lake where Jesus walked on water and called his disciples.', img: 'assets/images/sea-of-galilee.jpg' },
        'magdala': { name: 'Magdala', coords: [32.830, 35.526], desc: 'Home of Mary Magdalene, featuring an incredibly preserved 1st-century synagogue.', img: 'assets/images/magdala.jpg' },
        'en-gedi': { name: 'En-Gedi', coords: [31.455, 35.388], desc: 'The desert oasis where David hid from King Saul among the springs.', img: 'assets/images/en-gedi.jpg' }
    };

    let map;

    function nav(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-' + pageId).classList.remove('hidden');
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        if(pageId === 'map') setTimeout(initMap, 100);
    }

    function initMap() {
        if(map) { map.invalidateSize(); return; }
        map = L.map('map', { zoomControl: false }).setView([31.8, 35.3], 8);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        for (let key in tourData) {
            let loc = tourData[key];
            L.marker(loc.coords).addTo(map).on('click', () => showInfo(loc));
        }
    }

    function showInfo(loc) {
        document.getElementById('info-title').innerText = loc.name;
        document.getElementById('info-desc').innerText = loc.desc;
        document.getElementById('info-img').src = loc.img;
        document.getElementById('info-panel').style.display = 'block';
    }

    function activateTrip(trip) {
        nav('map', document.querySelectorAll('.tab-item')[1]);
    }
</script>
</body>
</html>
