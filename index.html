<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Israel Discovery | Sacred Steps</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css"> <base href="./"> 

    <style>
        /* These new rules ensure the 'Back' button and dynamic list are styled correctly */
        #itinerary-list-container {
            display: none; /* Hidden until trip is 'activated' */
        }
        .itinerary-active #itinerary-list-container {
            display: block;
        }
        .itinerary-active #catalog-view {
            display: none;
        }
        
        .btn-breadcrumb {
            background: none; border: none; color: var(--gray); font-size: 14px;
            font-weight: 600; padding: 10px 0; cursor: pointer; display: none; margin-bottom: 10px;
        }
        .itinerary-active .btn-breadcrumb {
            display: block;
        }
    </style>
</head>
<body id="main-body">

<header>
    <div class="app-title">SACRED STEPS</div>
    <div style="font-size: 1.2rem; background:#eee; padding:5px; border-radius:50%;">👤</div>
</header>

<div id="page-home" class="page">
    <button class="btn-breadcrumb" onclick="closeItinerary()">‹ Back to All Journeys</button>
    
    <div id="catalog-view">
        <h2 style="margin-top:0; font-weight: 800;">My Journeys</h2>
        <div class="card" onclick="openItinerary('galilee')">
            <img src="assets/images/sea-of-galilee.jpg" alt="Galilee">
            <div style="padding: 15px;">
                <span style="color:var(--accent); font-size:10px; font-weight:bold;">ACTIVE NOW</span>
                <h3 style="margin:5px 0; font-size:1.2rem;">The Way of the Galilee</h3>
                <p style="font-size:12px; color:#666; margin:0;">3 Days • 5 Locations</p>
            </div>
        </div>
        <div class="card" style="opacity:0.5; cursor:default;">
             <img src="assets/images/jerusalem.jpg" alt="Jerusalem">
             <div style="padding:15px;">
                 <span style="color:#777; font-size:10px; font-weight:bold;">UPCOMING</span>
                 <h3 style="margin:5px 0;">Eternal Jerusalem Deep-Dive</h3>
                 <p style="font-size:12px; color:#666;">Starts Oct 12, 2026</p>
             </div>
        </div>
    </div>

    <div id="itinerary-list-container">
        <h2 style="margin-top:0; font-weight: 800;">The Galilee: Day-by-Day</h2>
        <p style="color:var(--gray); font-size: 14px; margin-bottom: 20px;">Tap any location to open the full guide.</p>
        <div id="itinerary-list">
            </div>
    </div>
</div>

<div id="page-map" class="page hidden" style="padding:0;">
    <div id="map"></div>
</div>

<div id="page-contact" class="page hidden">
    <h2>Contact Support</h2>
    <p>We are here to help. Send us a message.</p>
</div>

<div id="guide-view" class="full-overlay">
    <div class="overlay-header">
        <h3 id="guide-title" style="margin:0; color:var(--primary);"></h3>
        <button class="btn-close" onclick="closeOverlay('guide-view')">Close</button>
    </div>
    <div id="guide-content" style="padding:20px;">
        </div>
</div>

<div class="tab-bar">
    <div id="tab-home" class="tab-item active" onclick="nav('home', this)">
        <span class="tab-icon">🏠</span>Home
    </div>
    <div id="tab-map" class="tab-item" onclick="nav('map', this)">
        <span class="tab-icon">📍</span>Map
    </div>
    <div id="tab-contact" class="tab-item" onclick="nav('contact', this)">
        <span class="tab-icon">📧</span>Support
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const tourData = {
        'jerusalem': { name: 'Jerusalem', coords: [31.768, 35.213], teaser: 'The spiritual heart of the world, home to thousands of years of bibical history.', history: 'Jerusalem has been a sacred site for millennia...', quote: '"Pray for the peace of Jerusalem: May those who love you be secure." - Psalm 122:6', verse: 'Micah 4:2...', img: 'assets/images/jerusalem.jpg' },
        'capernaum': { name: 'Capernaum', coords: [32.880, 35.575], teaser: 'Jesus\'s base of operations in Galilee. Explore the synagogue ruins.', history: 'A thriving fishing village in the 1st century...', quote: 'Built over the foundations of the synagogue...', verse: 'Matthew 4:13...', img: 'assets/images/capernaum.jpg' },
        'sea-of-galilee': { name: 'Sea of Galilee', coords: [32.82, 35.58], teaser: 'The freshwater lake where Jesus walked on water.', history: 'Setting for many recorded miracles...', quote: ' सेटिंग for both tranquil teachings and miraculous storms.', verse: 'Mark 1:16...', img: 'assets/images/sea-of-galilee.jpg' }
    };

    let map;

    // --- FUNCTION: STRING TRUNCATION (Kept) ---
    function truncateString(str) {
        if (str.length > 60) { return str.substring(0, 60) + '...'; }
        return str;
    }

    // --- 1. HOME -> ITINERARY (REFINED) ---
    // Dynamic Toggling within the same #page-home container
    function openItinerary(tripId) {
        if(tripId !== 'galilee') return;
        const listContainer = document.getElementById('itinerary-list');
        const mainBody = document.getElementById('main-body');
        
        listContainer.innerHTML = ''; // Clear old list
        
        for (let key in tourData) {
            const loc = tourData[key];
            const summaryCard = document.createElement('div');
            summaryCard.className = 'list-card';
            summaryCard.onclick = () => openGuide(key); // Opens full overlay
            summaryCard.innerHTML = `
                <img src="${loc.img}" class="list-img">
                <div class="list-details">
                    <h4 style="margin:0 0 5px 0;">${loc.name}</h4>
                    <p class="truncate">${truncateString(loc.teaser)}</p>
                </div>
                <div style="padding-right:15px; color:#ccc; font-size:20px;">›</div>
            `;
            listContainer.appendChild(summaryCard);
        }
        // Key State Change: Add class to body to toggle visibility
        mainBody.classList.add('itinerary-active');
    }

    function closeItinerary() {
        document.getElementById('main-body').classList.remove('itinerary-active');
    }

    // --- 2. ITINERARY -> FULL GUIDE OVERLAY (Kept) ---
    function openGuide(locKey) {
        const loc = tourData[locKey];
        const contentContainer = document.getElementById('guide-content');
        document.getElementById('guide-title').innerText = loc.name;
        
        contentContainer.innerHTML = `
            <img src="${loc.img}" style="width:100%; height:200px; object-fit:cover; border-radius:15px; margin-bottom:20px;">
            <div class="guide-section"><div class="section-h">Historical Significance</div><p style="margin:0; line-height:1.6; color:#333;">${loc.history}</p></div>
            <div class="guide-section"><div class="section-h">Reflection</div><p style="margin:0; font-style:italic; color:#555;">${loc.quote}</p></div>
            <div class="guide-section"><div class="section-h">Biblical Context</div><div class="verse-box">${loc.verse}</div></div>
            <button onclick="viewOnMap([${loc.coords}])" class="btn-map-nav">📍 View on Map</button>
        `;
        document.getElementById('guide-view').style.display = 'block';
    }

    // --- 3. GUIDE -> MAP (REFINED FLOW) ---
    function viewOnMap(coords) {
        // Only close the guide, not the itinerary summary state
        closeOverlay('guide-view');
        // Nav to map tab
        nav('map', document.getElementById('tab-map'));
        // Focus the map
        setTimeout(() => map.flyTo(coords, 14), 200);
    }

    function closeOverlay(viewId) { document.getElementById(viewId).style.display = 'none'; }

    // --- MAP & TAB LOGIC (Kept) ---
    function nav(pageId, el) {
        // If they click 'Home' tab and we are in an active itinerary, we keep it active. 
        // If they click support or map, we just hide the home page container.
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-' + pageId).classList.remove('hidden');
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        if(pageId === 'map') setTimeout(initMap, 100);
    }

    function initMap() {
        if(map) { map.invalidateSize(); return; }
        map = L.map('map', { zoomControl: false }).setView([32.8, 35.5], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        for (let key in tourData) { L.marker(tourData[key].coords).addTo(map); }
    }
</script>
</body>
</html>
