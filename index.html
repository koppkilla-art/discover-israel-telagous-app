<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sacred Steps | Israel Discovery</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <base href="./"> <style>
        :root { --primary: #0038b8; --bg: #f8f9fa; --white: #ffffff; --text: #1a1a1a; --accent: #27ae60; --gray: #888; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* --- Global Components --- */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: white; border-bottom: 1px solid #eee; z-index: 1000; position: relative; }
        .app-title { font-weight: 800; font-size: 1.1rem; color: var(--primary); }
        
        .page { height: calc(100vh - 140px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; }

        /* --- MAP PAGE UI --- */
        #page-map { padding: 0; position: relative; } /* Corrected padding for map */
        #map { height: 100%; width: 100%; z-index: 1; } /* Added z-index to map */
        
        /* --- 1. MAP PREVIEW CARD (REFINED) --- */
        #map-preview-card {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(5px);
            border-radius: 15px; padding: 12px; display: none; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 2000; /* Must be higher than map's z-index */
            cursor: pointer; border: 1px solid #eee; transition: transform 0.2s ease-out;
        }
        #map-preview-card.show { display: flex; transform: translateY(0); }
        .preview-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; margin-right: 12px; }
        .preview-details { flex-grow: 1; }
        .preview-title { font-size: 16px; font-weight: 700; margin: 0; color: var(--primary); }
        .preview-cta { font-size: 11px; color: var(--gray); font-weight: 600; margin-top: 2px; text-transform: uppercase; }

        /* --- 2. FULL GUIDE OVERLAY (UPDATED) --- */
        #guide-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 6000; display: none; overflow-y: auto;
            padding-bottom: 80px; box-sizing: border-box;
        }
        .overlay-header {
            position: sticky; top: 0; background: var(--bg); padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; z-index: 10;
        }
        .btn-close { border: none; background: #eee; padding: 10px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .guide-section { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #eee; }
        .section-h { font-size: 0.8rem; font-weight: 800; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .verse-box { background: #f0f4ff; border-left: 4px solid var(--primary); padding: 15px; font-style: italic; color: #333; }

        /* --- Home/Catalog Cards --- */
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; cursor: pointer; border: 1px solid #eee; }
        .card img { width: 100%; height: 180px; object-fit: cover; }

        /* --- Tab Bar --- */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 10px 0 25px 0; border-top: 1px solid #eee; z-index: 5000; }
        .tab-item { flex: 1; text-align: center; color: #aaa; font-size: 10px; font-weight: 600; cursor: pointer; }
        .tab-item.active { color: var(--primary); }
        .tab-icon { font-size: 20px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

<header>
    <div class="app-title">SACRED STEPS</div>
    <div style="font-size: 1.2rem; background:#eee; padding:5px; border-radius:50%;">👤</div>
</header>

<div id="page-home" class="page">
    <h2 style="margin-top:0; font-weight: 800;">My Journeys</h2>
    <div class="card" onclick="activateTrip('galilee')">
        <img src="assets/images/sea-of-galilee.jpg" alt="Galilee">
        <div style="padding: 15px;">
            <span style="color:var(--accent); font-size:10px; font-weight:bold;">ACTIVE NOW</span>
            <h3 style="margin:5px 0; font-size:1.2rem;">The Way of the Galilee</h3>
            <p style="font-size:12px; color:#666; margin:0;">3 Days • 4 Locations Unlocked</p>
        </div>
    </div>
</div>

<div id="page-map" class="page hidden"> <div id="map"></div>
    
    <div id="map-preview-card" onclick="openFullGuideFromMap()">
        <img id="preview-thumb" src="" class="preview-img">
        <div class="preview-details">
            <h3 id="preview-name" class="preview-title"></h3>
            <p class="preview-cta">View Full Historical Guide ›</p>
        </div>
    </div>
</div>

<div id="page-contact" class="page hidden">
    <h2>Contact Support</h2>
    <p>We are here to help. Send us a message.</p>
</div>

<div id="guide-view" class="full-overlay">
    <div class="overlay-header">
        <h3 id="guide-title" style="margin:0; color:var(--primary);"></h3>
        <button class="btn-close" onclick="closeGuide()">Close</button>
    </div>
    <div id="guide-content" style="padding:20px;">
        </div>
</div>

<div class="tab-bar">
    <div class="tab-item active" onclick="nav('home', this)">
        <span class="tab-icon">🏠</span>Home
    </div>
    <div class="tab-item" onclick="nav('map', this)">
        <span class="tab-icon">📍</span>Map
    </div>
    <div class="tab-item" onclick="nav('contact', this)">
        <span class="tab-icon">📧</span>Support
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- UPDATED AND FIXED TOUR DATA ---
    const tourData = {
        'jerusalem': { name: 'Jerusalem', coords: [31.768, 35.213], history: 'Jerusalem has been a sacred site for millennia...', quote: '"Pray for the peace of Jerusalem..."', verse: 'Micah 4:2...', img: 'assets/images/jerusalem.jpg' },
        'capernaum': { name: 'Capernaum', coords: [32.880, 35.575], history: 'Jesus\'s base of operations in Galilee...', quote: 'Built over the foundations of the synagogue...', verse: 'Matthew 4:13...', img: 'assets/images/capernaum.jpg' },
        'sea-of-galilee': { name: 'Sea of Galilee', coords: [32.82, 35.58], history: 'Setting for many recorded miracles...', quote: 'Setting for tranquil teachings and miraculous storms.', verse: 'Mark 1:16...', img: 'assets/images/sea-of-galilee.jpg' },
        'magdala': { name: 'Magdala', coords: [32.830, 35.526], history: 'Home of Mary Magdalene, featuring an incredibly preserved 1st-century synagogue.', quote: 'A significant archaeological discovery on the shores of the Galilee.', verse: 'Luke 8:1-2...', img: 'assets/images/magdala.jpg' }
    };

    let map;
    let currentLocKey = null; // Tracks which pin is tapped

    // 1. Navigation Logic
    function nav(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-' + pageId).classList.remove('hidden');
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        
        // --- FIXED LOGIC ---
        // Hide map preview when leaving map page and clear current location key
        hideMapPreview();

        if(pageId === 'map') setTimeout(initMap, 100);
    }

    // 2. Activate Trip from Home
    function activateTrip(trip) {
        nav('map', document.querySelectorAll('.tab-item')[1]);
    }

    // 3. Initialize Map with Pins
    function initMap() {
        if(map) { map.invalidateSize(); return; }
        map = L.map('map', { zoomControl: false }).setView([32.85, 35.55], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        // --- FIXED LOGIC ---
        // Ensure markers are added *after* the map is fully loaded
        for (let key in tourData) {
            let loc = tourData[key];
            let marker = L.marker(loc.coords).addTo(map);
            
            // Connect pin click directly to the showMapPreview function
            marker.on('click', () => showMapPreview(key));
        }
        
        // --- FIXED LOGIC ---
        // Ensure clicking on the map hides the preview card, but tapping on the card does not
        map.on('click', hideMapPreview);
    }

    // 4. --- SHOW MAP PREVIEW CARD ---
    function showMapPreview(locKey) {
        currentLocKey = locKey; // Track which location is active
        const loc = tourData[locKey];
        const card = document.getElementById('map-preview-card');
        
        // --- FIXED LOGIC ---
        // Clear old content and update with current location
        document.getElementById('preview-name').innerText = loc.name;
        document.getElementById('preview-thumb').src = loc.img;
        
        // Use class to toggle visibility and ensure panTo is smooth
        card.classList.add('show');
        map.panTo(loc.coords);
    }

    function hideMapPreview() {
        document.getElementById('map-preview-card').classList.remove('show');
        currentLocKey = null;
    }

    // 5. --- OPEN FULL GUIDE FROM MAP (Drill-Down Logic) ---
    // User taps the dynamic preview card to "drill down"
    function openFullGuideFromMap() {
        if(!currentLocKey) return; // Safety check: ensured by currentLocKey being null after hideMapPreview
        
        const loc = tourData[currentLocKey];
        const contentContainer = document.getElementById('guide-content');
        
        // Close the map preview card first for smooth transition
        hideMapPreview();

        // --- FIXED LOGIC ---
        // Dynamically build the multi-section deep dive inside the overlay
        document.getElementById('guide-title').innerText = loc.name;
        contentContainer.innerHTML = `
            <img src="${loc.img}" style="width:100%; height:180px; object-fit:cover; border-radius:15px; margin-bottom:20px;">
            <div class="guide-section"><div class="section-h">Historical Significance</div><p style="margin:0; line-height:1.6; color:#333;">${loc.history}</p></div>
            <div class="guide-section"><div class="section-h">Reflection</div><p style="margin:0; font-style:italic; color:#555;">${loc.quote}</p></div>
            <div class="guide-section"><div class="section-h">Biblical Context</div><div class="verse-box">${loc.verse}</div></div>
        `;
        // Show the guide overlay while maintaining the current tab (Map)
        document.getElementById('guide-view').style.display = 'block';
    }

    function closeGuide() {
        document.getElementById('guide-view').style.display = 'none';
    }
</script>
</body>
</html>
