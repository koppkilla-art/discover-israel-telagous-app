<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Israel Expedition: Full Guide</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #0038b8; --locked: #777; --unlocked: #27ae60; --danger: #c0392b; }
        body { font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f4f4f4; overflow: hidden; }
        header { background: var(--primary); color: white; padding: 12px; text-align: center; z-index: 1001; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .controls { background: white; padding: 10px; display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; border-bottom: 1px solid #ddd; z-index: 1001; }
        select, button { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 0.8rem; cursor: pointer; }
        #map { flex-grow: 1; width: 100%; z-index: 1; }

        /* Detail Panel */
        #details-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; background: white; 
            height: 65vh; overflow-y: auto; padding: 25px; border-top: 6px solid var(--primary);
            z-index: 2000; box-shadow: 0 -5px 30px rgba(0,0,0,0.4); display: none;
            border-radius: 25px 25px 0 0;
        }

        .img-container { width: 100%; height: 230px; overflow: hidden; border-radius: 15px; margin: 15px 0; background: #222; position: relative; }
        .location-image { width: 100%; height: 100%; object-fit: cover; }
        .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; backdrop-filter: blur(5px); }
        
        .custom-pin { width: 24px; height: 24px; border-radius: 50%; background: var(--locked); border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.4); cursor: pointer; transition: 0.3s; }
        .custom-pin.active { background: var(--unlocked); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(39, 174, 96, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(39, 174, 96, 0); } 100% { box-shadow: 0 0 0 0px rgba(39, 174, 96, 0); } }

        .full-info-text { line-height: 1.7; color: #2c3e50; font-size: 1rem; }
        .teaser-text { font-style: italic; color: #7f8c8d; line-height: 1.5; }
        .video-box { background: #1a1a1a; color: #fff; height: 120px; display: flex; align-items: center; justify-content: center; border-radius: 12px; margin-top: 20px; font-size: 0.9rem; border: 1px solid #333; }
    </style>
</head>
<body>

<header><h1>Israel Expedition Guide</h1></header>

<div class="controls">
    <div><small>Admin Unlock</small><select id="admin-trigger" onchange="unlockLocation(this.value)"><option value="">Select Site...</option></select></div>
    <div><small>My Journey</small><select id="user-log" onchange="showContent(this.value)"><option value="">Visited...</option></select></div>
    <div style="align-self:end;"><button onclick="resetTour()" style="background:#f8f9fa; color:#333; border:1px solid #ddd;">Reset</button></div>
</div>

<div id="map"></div>

<div id="details-panel">
    <button onclick="closePanel()" style="float:right; background:#f0f2f5; border:none; padding:12px; border-radius:50%; width:45px; height:45px; font-weight:bold;">✕</button>
    <div id="status-tag"></div>
    <h2 id="detail-title" style="margin:15px 0 5px 0; color:var(--primary); font-size:1.8rem;"></h2>
    
    <div class="img-container">
        <img id="detail-img" class="location-image" src="">
        <div id="lock-screen" class="lock-overlay">
            <span style="font-size:1.2rem; letter-spacing:1px;">🔒 CONTENT LOCKED</span>
            <p style="font-size:0.8rem; margin-top:8px; opacity:0.8;">Arrive at this pin to unlock the full history.</p>
        </div>
    </div>

    <div id="info-body">
        <p id="detail-desc"></p>
    </div>
    
    <div id="unlocked-media" style="display:none;">
        <div class="video-box">🎥 Exclusive Tour Video: Unlocked</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const tourData = {
        'jerusalem': { 
            name: 'Jerusalem', 
            coords: [31.7683, 35.2137], 
            teaser: 'The spiritual heart of the world and the eternal city of gold.', 
            full: 'Jerusalem is one of the oldest cities in the world and serves as the spiritual epicenter for three major religions. Within its ancient limestone walls, you will find the Western Wall, the Dome of the Rock, and the Church of the Holy Sepulchre. This location marks the site of the First and Second Temples and was the focal point of the final week of Jesus’s earthly ministry. Walking these streets offers a unique intersection of thousands of years of biblical history and modern culture.', 
            img: 'https://cdn.pixabay.com/photo/2016/10/05/13/41/jerusalem-1716709_1280.jpg' 
        },
        'capernaum': { 
            name: 'Capernaum', 
            coords: [32.8807, 35.5752], 
            teaser: 'The fishing village that served as Jesus’s base of operations in the Galilee.', 
            full: 'Often referred to as "the town of Jesus," Capernaum was a thriving fishing village during the 1st century. It is here that Jesus performed many miracles and taught in the local synagogue, the white limestone remains of which are still visible today. Excavations have also revealed a structure believed to be the house of the Apostle Peter, now preserved under a modern church. The site remains a powerful testament to the daily life and communal worship of the early disciples.', 
            img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Capernaum-0785.jpg/1200px-Capernaum-0785.jpg' 
        },
        'sea-of-galilee': { 
            name: 'Sea of Galilee', 
            coords: [32.82, 35.58], 
            teaser: 'The famous freshwater lake where the disciples were called to be fishers of men.', 
            full: 'The Sea of Galilee, or Lake Kinneret, is the lowest freshwater lake on Earth and provided the primary livelihood for many of the Apostles. It was across these waters that Jesus walked, calmed the raging storm, and fed the multitudes on the surrounding hillsides. Today, the lake is still central to the region’s water supply and offers peaceful vistas of the Golan Heights to the east. Modern visitors can still take boat rides across the lake to experience the same geography navigated by the biblical figures.', 
            img: 'https://images.unsplash.com/photo-1552353617-3bfd679b3bdd?w=800&h=600&fit=crop' 
        },
        'en-gedi': { 
            name: 'En-Gedi', 
            coords: [31.4550, 35.3881], 
            teaser: 'A lush desert oasis hidden among the barren cliffs of the Dead Sea.', 
            full: 'En-Gedi is a breathtaking nature reserve where fresh spring water creates a vibrant oasis in the middle of the Judean Wilderness. Biblical history records this as the location where David sought refuge in caves while fleeing from the wrath of King Saul. The area is famous for its diverse wildlife, including the Nubian ibex and rock hyrax, which are frequently spotted by hikers. Its waterfalls and lush greenery standing against the harsh desert backdrop serve as a powerful metaphor for spiritual refreshment.', 
            img: 'https://images.unsplash.com/photo-1590422941893-6a9787e95b05?w=800&h=600&fit=crop' 
        },
        'magdala': { 
            name: 'Magdala', 
            coords: [32.8306, 35.5264], 
            teaser: 'The birthplace of Mary Magdalene and a premier 1st-century archaeological site.', 
            full: 'Located on the shore of the Galilee, Magdala was a prosperous fish-processing center during the Roman period. Recent excavations in 2009 revealed a rare 1st-century synagogue, one of only a handful found in the entire country, containing the intricately carved "Magdala Stone." This site offers a rare, direct look into the world of Jewish worship during the time of the Second Temple. The discovery of ritual baths and marketplaces here provides a vivid picture of the community where Mary Magdalene was born.', 
            img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Magdala_Synagogue_2.jpg/1200px-Magdala_Synagogue_2.jpg' 
        }
    };

    let map, markers = {}, unlocked = JSON.parse(localStorage.getItem('itTourMem')) || [];

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([31.8, 35.3], 8);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        const adminSelect = document.getElementById('admin-trigger');

        for (const key in tourData) {
            const isUnlocked = unlocked.includes(key);
            const icon = L.divIcon({ 
                className: '', 
                html: `<div id="pin-${key}" class="custom-pin ${isUnlocked ? 'active' : ''}"></div>`, 
                iconSize: [24, 24] 
            });

            const marker = L.marker(tourData[key].coords, { icon: icon }).addTo(map);
            marker.on('click', (e) => { L.DomEvent.stopPropagation(e); showContent(key); });

            markers[key] = marker;
            let opt = document.createElement('option'); opt.value = key; opt.innerText = tourData[key].name; adminSelect.appendChild(opt);
        }
        updateUserLog();
    }

    function unlockLocation(key) {
        if(!key) return;
        if(!unlocked.includes(key)) {
            unlocked.push(key);
            localStorage.setItem('itTourMem', JSON.stringify(unlocked));
        }
        const pin = document.getElementById(`pin-${key}`);
        if(pin) pin.classList.add('active');
        updateUserLog();
        showContent(key);
        map.flyTo(tourData[key].coords, 14);
    }

    function showContent(key) {
        if(!key || !tourData[key]) return;
        const loc = tourData[key];
        const isUnlocked = unlocked.includes(key);
        const descEl = document.getElementById('detail-desc');
        
        document.getElementById('detail-title').innerText = loc.name;
        document.getElementById('detail-img').src = loc.img;
        
        if(isUnlocked) {
            document.getElementById('status-tag').innerHTML = "<b style='color:var(--unlocked)'>✓ ARRIVED & UNLOCKED</b>";
            descEl.className = "full-info-text";
            descEl.innerText = loc.full;
            document.getElementById('lock-screen').style.display = "none";
            document.getElementById('unlocked-media').style.display = "block";
        } else {
            document.getElementById('status-tag').innerHTML = "<b style='color:#777'>🔒 PREVIEW MODE</b>";
            descEl.className = "teaser-text";
            descEl.innerHTML = `${loc.teaser}<br><br><span style="font-size:0.8rem;"><i>Note: Arrive here or use admin override to read the full historical summary and view high-resolution media.</i></span>`;
            document.getElementById('lock-screen').style.display = "flex";
            document.getElementById('unlocked-media').style.display = "none";
        }

        document.getElementById('details-panel').style.display = 'block';
    }

    function updateUserLog() {
        const log = document.getElementById('user-log');
        log.innerHTML = '<option value="">Visited...</option>';
        unlocked.forEach(key => {
            let opt = document.createElement('option'); opt.value = key; opt.innerText = tourData[key].name; log.appendChild(opt);
        });
    }

    function closePanel() { document.getElementById('details-panel').style.display = 'none'; }
    function resetTour() { if(confirm("Erase all history?")) { localStorage.clear(); location.reload(); } }

    window.onload = initMap;
</script>
</body>
</html>
