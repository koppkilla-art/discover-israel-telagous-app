<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Discover Israel | Expedition</title>
    
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Discover Israel">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
    <base href="./"> 

    <style>
        /* Essential Inline Fixes for Mobile Navigation & Overlays */
        #page-map { padding: 0 !important; height: 100vh; position: absolute; top: 0; width: 100%; }
        
        #map-preview-card {
            position: absolute; 
            bottom: calc(95px + env(safe-area-inset-bottom, 0px)); 
            left: 15px; right: 15px;
            background: rgba(255,255,255,0.98); 
            backdrop-filter: blur(10px);
            border-radius: 16px; padding: 12px; display: none; align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15); 
            z-index: 4000; 
            border: 1px solid rgba(0,0,0,0.05);
            pointer-events: auto;
        }
        #map-preview-card.show { display: flex; }

        /* Navigation State Visibility Logic */
        #page-home #catalog-view { display: block; }
        #page-home #itinerary-summary-container,
        #page-home #full-guide-container { display: none; }

        .itinerary-active #page-home #itinerary-summary-container { display: block; }
        .itinerary-active #page-home #catalog-view,
        .itinerary-active #page-home #full-guide-container { display: none; }

        .guide-active #page-home #full-guide-container { display: block; }
        .guide-active #page-home #catalog-view,
        .guide-active #page-home #itinerary-summary-container { display: none; }
    </style>
</head>
<body id="main-body">

<div id="login-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--primary); z-index:999999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; box-sizing:border-box; color:white; pointer-events: all !important;">
    <h1 style="margin-bottom:10px; letter-spacing:-1px;">DISCOVER ISRAEL</h1>
    <p style="margin-bottom:30px; opacity:0.8;">Expedition 2026 Login</p>
    
    <input id="login-user" placeholder="Username" style="width:100%; padding:15px; border-radius:10px; border:none; margin-bottom:15px; font-size:16px; position:relative; z-index:1000001;">
    <input id="login-pass" type="password" placeholder="Password" style="width:100%; padding:15px; border-radius:10px; border:none; margin-bottom:25px; font-size:16px; position:relative; z-index:1000001;">
    
    <button onclick="handleLogin()" style="width:100%; padding:15px; border-radius:10px; border:none; background:var(--accent); color:white; font-weight:bold; font-size:18px; cursor:pointer; position:relative; z-index:1000001; pointer-events: auto;">Sign In</button>
</div>

<header>
    <div class="app-title">DISCOVER ISRAEL</div>
    <div style="font-size: 1.2rem; background:#eee; padding:5px; border-radius:50%;">👤</div>
</header>

<div id="page-home" class="page">
    <div id="catalog-view">
        <h2 style="margin-top:0; font-weight: 800;">My Journeys</h2>
        <div class="card" onclick="openItinerary('galilee')">
            <img src="assets/images/sea-of-galilee.jpg" alt="Galilee">
            <div style="padding: 15px;">
                <span style="color:var(--accent); font-size:10px; font-weight:bold;">ACTIVE NOW</span>
                <h3 style="margin:5px 0; font-size:1.2rem;">The Way of the Galilee</h3>
                <p style="font-size:12px; color:#666; margin:0;">3 Days • 5 Locations</p>
            </div>
        </div>
    </div>

    <div id="itinerary-summary-container">
        <button class="btn-breadcrumb to-journeys" onclick="backToJourneys()">‹ Back to All Journeys</button>
        <h2 style="margin-top:0; font-weight: 800;">Galilee Itinerary</h2>
        <div id="itinerary-summary-list"></div>
    </div>

    <div id="full-guide-container">
        <button class="btn-breadcrumb to-itinerary" onclick="backToItinerary()">‹ Back to Itinerary</button>
        <h2 id="deep-dive-title" style="color:var(--primary); margin-bottom:10px;"></h2>
        <img id="deep-dive-hero" src="" style="width:100%; height:200px; object-fit:cover; border-radius:15px; margin-bottom:20px;">
        <div id="deep-dive-content"></div>
    </div>
</div>

<div id="page-map" class="page hidden">
    <div id="map"></div>
    <div id="map-preview-card" onclick="openFullGuideFromMap()">
        <img id="preview-thumb" src="" class="preview-img">
        <div class="preview-details">
            <h3 id="preview-name" class="preview-title"></h3>
            <p class="preview-cta">View Details ›</p>
        </div>
    </div>
</div>

<div id="page-feed" class="page hidden">
    <h2 style="margin-top:0; font-weight: 800;">Live Feed</h2>
    <div id="live-feed-container"></div>
</div>

<div id="page-contact" class="page hidden">
    <h2>Support</h2>
    <div class="deep-dive-box">
        <p><strong>Emergency:</strong> +972 50-000-0000</p>
        <p><strong>Email:</strong> guide@discoverisrael.com</p>
    </div>
</div>

<div id="page-admin" class="page hidden">
    <h2 style="margin-top:0;">Admin Console</h2>
    <div class="deep-dive-box">
        <label class="section-h">Target Location</label>
        <select id="admin-target-loc" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px;">
            <option value="all">Global Update (Updates Only)</option>
            <option value="jerusalem">Jerusalem</option>
            <option value="capernaum">Capernaum</option>
            <option value="sea-of-galilee">Sea of Galilee</option>
        </select>
        <input id="admin-title" placeholder="Headline" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
        <textarea id="admin-text" placeholder="Message..." style="width:100%; padding:10px; height:80px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;"></textarea>
        <select id="admin-image" style="width:100%; padding:10px; margin-bottom:20px; border-radius:8px;">
            <option value="">No Image</option>
            <option value="assets/images/group-photo.jpg">Group Photo</option>
            <option value="assets/images/weather-alert.jpg">Weather Alert</option>
        </select>
        <button onclick="processAdminPush()" class="btn-map-nav" style="background:var(--accent);">🚀 Push Update</button>
    </div>
</div>

<div class="tab-bar">
    <div id="tab-home" class="tab-item active" onclick="nav('home', this)">
        <span class="tab-icon">🏠</span>Home
    </div>
    <div id="tab-map" class="tab-item" onclick="nav('map', this)">
        <span class="tab-icon">📍</span>Map
    </div>
    <div id="tab-feed" class="tab-item" onclick="nav('feed', this)">
        <span class="tab-icon">🔔</span>Updates
    </div>
    <div id="tab-contact" class="tab-item" onclick="nav('contact', this)">
        <span class="tab-icon">📧</span>Support
    </div>
    <div id="tab-admin" class="tab-item hidden" onclick="nav('admin', this)">
        <span class="tab-icon">🛠️</span>Admin
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // DATA LAYER
    const tourData = {
        'jerusalem': { name: 'Jerusalem', coords: [31.768, 35.213], teaser: 'The heart of the world.', history: 'Jerusalem has been a sacred site for millennia...', verse: 'Micah 4:2', img: 'assets/images/jerusalem.jpg', liveUpdates: [] },
        'capernaum': { name: 'Capernaum', coords: [32.880, 35.575], teaser: 'Jesus\' base in Galilee.', history: 'A fishing village ruins...', verse: 'Matthew 4:13', img: 'assets/images/capernaum.jpg', liveUpdates: [] },
        'sea-of-galilee': { name: 'Sea of Galilee', coords: [32.82, 35.58], teaser: 'The freshwater lake.', history: 'Setting for many miracles...', verse: 'Mark 1:16', img: 'assets/images/sea-of-galilee.jpg', liveUpdates: [] }
    };

    let map, currentLocKey = null;
    let currentUser = null;
    let liveFeed = [];

    // LOGIN SYSTEM
    function handleLogin() {
        const user = document.getElementById('login-user').value.toLowerCase().trim();
        const pass = document.getElementById('login-pass').value.trim();
        if (user === "user" && pass === "1234") loginSuccess("user");
        else if (user === "admin" && pass === "4321") loginSuccess("admin");
        else alert("Invalid credentials.");
    }

    function loginSuccess(role) {
        currentUser = role;
        document.getElementById('login-screen').style.display = 'none';
        if (role === "admin") document.getElementById('tab-admin').classList.remove('hidden');
        nav('home', document.getElementById('tab-home'));
    }

    // NAVIGATION
    function nav(pageId, el, preserveState = false) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        const target = document.getElementById('page-' + pageId);
        if (target) target.classList.remove('hidden');
        
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        if (el) el.classList.add('active');
        
        hideMapPreview();
        if (pageId === 'feed') renderFeed();
        if (pageId === 'home' && !preserveState) closeItinerary();
        if (pageId === 'map') setTimeout(initMap, 200);
    }

    // ADMIN LOGIC
    function processAdminPush() {
        const target = document.getElementById('admin-target-loc').value;
        const title = document.getElementById('admin-title').value;
        const text = document.getElementById('admin-text').value;
        const img = document.getElementById('admin-image').value;
        if (!title || !text) return alert("Fill out headline and message.");

        const update = { title, text, img, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
        liveFeed.unshift(update);
        if (target !== "all" && tourData[target]) tourData[target].liveUpdates.push(update);

        alert("Update pushed successfully!");
        nav('feed', document.getElementById('tab-feed'));
        
        document.getElementById('admin-title').value = '';
        document.getElementById('admin-text').value = '';
    }

    function renderFeed() {
        const container = document.getElementById('live-feed-container');
        if (!container) return;
        container.innerHTML = liveFeed.map(post => `
            <div class="deep-dive-box">
                <div style="display:flex; justify-content:space-between; font-size:10px; color:gray; margin-bottom:10px;">
                    <span>LIVE UPDATE</span><span>${post.time}</span>
                </div>
                ${post.img ? `<img src="${post.img}" style="width:100%; border-radius:10px; margin-bottom:10px;">` : ''}
                <h4 style="margin:0;">${post.title}</h4>
                <p style="margin:5px 0 0 0; font-size:14px; line-height:1.4;">${post.text}</p>
            </div>
        `).join('');
    }

    // CORE APP LOGIC
    function openItinerary(tripId) {
        const list = document.getElementById('itinerary-summary-list');
        list.innerHTML = Object.keys(tourData).map(key => `
            <div class="list-card" onclick="openGuide('${key}')">
                <img src="${tourData[key].img}" class="list-img">
                <div class="list-details">
                    <h4 style="margin:0;">${tourData[key].name}</h4>
                    <p style="font-size:12px; color:gray; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${tourData[key].teaser}</p>
                </div>
                <div style="padding-right:10px; color:#ccc;">›</div>
            </div>
        `).join('');
        document.getElementById('main-body').classList.add('itinerary-active');
    }

    function openGuide(key) {
        const loc = tourData[key];
        let html = `<div class="deep-dive-box"><h5>History</h5><p>${loc.history}</p></div><div class="deep-dive-box"><h5>Bible Context</h5><div class="verse-block">${loc.verse}</div></div>`;
        
        if (loc.liveUpdates && loc.liveUpdates.length > 0) {
            html += `<h3 style="margin:20px 0 10px 0;">Live Updates</h3>` + loc.liveUpdates.map(u => `
                <div class="deep-dive-box" style="border: 2px solid var(--accent);">
                    <div style="font-size:10px; color:var(--accent); font-weight:bold; margin-bottom:5px;">ADMIN • ${u.time}</div>
                    ${u.img ? `<img src="${u.img}" style="width:100%; border-radius:8px; margin-bottom:10px;">` : ''}
                    <h4 style="margin:0;">${u.title}</h4>
                    <p style="font-size:14px; margin-top:5px;">${u.text}</p>
                </div>
            `).join('');
        }
        
        html += `<button onclick="viewOnMap([${loc.coords}], '${key}')" class="btn-map-nav">📍 View on Map</button>`;
        document.getElementById('deep-dive-title').innerText = loc.name;
        document.getElementById('deep-dive-hero').src = loc.img;
        document.getElementById('deep-dive-content').innerHTML = html;
        document.getElementById('main-body').classList.add('guide-active');
    }

    function backToJourneys() { document.getElementById('main-body').classList.remove('itinerary-active'); }
    function backToItinerary() { document.getElementById('main-body').classList.remove('guide-active'); }
    function closeItinerary() { document.getElementById('main-body').classList.remove('itinerary-active', 'guide-active'); }

    // MAP LOGIC
    function initMap() {
        if (map) return map.invalidateSize();
        map = L.map('map', { zoomControl: false, tap: true }).setView([32.8, 35.5], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        Object.keys(tourData).forEach(key => {
            L.marker(tourData[key].coords).addTo(map).on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                showMapPreview(key);
            });
        });
        map.on('click', hideMapPreview);
    }

    function showMapPreview(key) {
        currentLocKey = key;
        document.getElementById('preview-name').innerText = tourData[key].name;
        document.getElementById('preview-thumb').src = tourData[key].img;
        document.getElementById('map-preview-card').classList.add('show');
        map.panTo(tourData[key].coords);
    }

    function hideMapPreview() { document.getElementById('map-preview-card').classList.remove('show'); }
    function openFullGuideFromMap() { if (currentLocKey) { openGuide(currentLocKey); nav('home', document.getElementById('tab-home'), true); } }
    function viewOnMap(coords, key) { nav('map', document.getElementById('tab-map')); setTimeout(() => { map.flyTo(coords, 14); showMapPreview(key); }, 300); }

    window.onload = () => console.log("System Ready.");
</script>
</body>
</html>
