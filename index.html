<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sacred Steps | Israel Discovery</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
    <base href="./"> 

    <style>
        /* --- MOBILE LAYOUT OVERRIDES --- */
        #page-map { padding: 0 !important; height: 100vh; position: absolute; top: 0; width: 100%; }
        
        /* Ensures Map Preview sits ABOVE the Tab Bar */
        #map-preview-card {
            position: absolute; 
            bottom: calc(90px + env(safe-area-inset-bottom, 0px)); 
            left: 15px; right: 15px;
            background: rgba(255,255,255,0.98); 
            backdrop-filter: blur(10px);
            border-radius: 16px; padding: 12px; display: none; align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15); z-index: 4000; 
            border: 1px solid rgba(0,0,0,0.05);
        }
        #map-preview-card.show { display: flex; }

        /* State Toggling for Tiered Navigation */
        #page-home #catalog-view { display: block; }
        #page-home #itinerary-summary-container,
        #page-home #full-guide-container { display: none; }

        .itinerary-active #page-home #itinerary-summary-container { display: block; }
        .itinerary-active #page-home #catalog-view,
        .itinerary-active #page-home #full-guide-container { display: none; }

        .guide-active #page-home #full-guide-container { display: block; }
        .guide-active #page-home #catalog-view,
        .guide-active #page-home #itinerary-summary-container { display: none; }
    </style>
</head>
<body id="main-body">

<header>
    <div class="app-title">SACRED STEPS</div>
    <div style="font-size: 1.2rem; background:#eee; padding:5px; border-radius:50%;">👤</div>
</header>

<div id="page-home" class="page">
    
    <div id="catalog-view">
        <h2 style="margin-top:0; font-weight: 800;">My Journeys</h2>
        <div class="card" onclick="openItinerary('galilee')">
            <img src="assets/images/sea-of-galilee.jpg" alt="Galilee">
            <div style="padding: 15px;">
                <span style="color:var(--accent); font-size:10px; font-weight:bold;">ACTIVE NOW</span>
                <h3 style="margin:5px 0; font-size:1.2rem;">The Way of the Galilee</h3>
                <p style="font-size:12px; color:#666; margin:0;">3 Days • 5 Locations</p>
            </div>
        </div>
    </div>

    <div id="itinerary-summary-container">
        <button class="btn-breadcrumb to-journeys" onclick="backToJourneys()">‹ Back to All Journeys</button>
        <h2 style="margin-top:0; font-weight: 800;">Galilee Itinerary</h2>
        <div id="itinerary-summary-list"></div>
    </div>

    <div id="full-guide-container">
        <button class="btn-breadcrumb to-itinerary" onclick="backToItinerary()">‹ Back to Itinerary</button>
        <h2 id="deep-dive-title" style="color:var(--primary);"></h2>
        <img id="deep-dive-hero" src="" style="width:100%; height:200px; object-fit:cover; border-radius:15px; margin-bottom:20px;">
        <div id="deep-dive-content"></div>
    </div>
</div>

<div id="page-map" class="page hidden">
    <div id="map"></div>
    <div id="map-preview-card" onclick="openFullGuideFromMap()" style="z-index: 9999; cursor: pointer;">
    <img id="preview-thumb" src="" class="preview-img">
    <div class="preview-details">
        <h3 id="preview-name" class="preview-title"></h3>
        <p class="preview-cta">View Full Historical Guide ›</p>
    </div>
</div>
</div>

<div id="page-contact" class="page hidden">
    <h2>Contact Support</h2>
    <p>Questions? We're here for you.</p>
</div>

<div class="tab-bar">
    <div id="tab-home" class="tab-item active" onclick="nav('home', this)">
        <span class="tab-icon">🏠</span>Home
    </div>
    <div id="tab-map" class="tab-item" onclick="nav('map', this)">
        <span class="tab-icon">📍</span>Map
    </div>
    <div id="tab-contact" class="tab-item" onclick="nav('contact', this)">
        <span class="tab-icon">📧</span>Support
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const tourData = {
        'jerusalem': { name: 'Jerusalem', coords: [31.768, 35.213], teaser: 'The spiritual heart of the world, home to thousands of years of bibical history.', history: 'Jerusalem has been a sacred site for millennia...', quote: 'Pray for the peace of Jerusalem...', verse: 'Micah 4:2...', img: 'assets/images/jerusalem.jpg' },
        'capernaum': { name: 'Capernaum', coords: [32.880, 35.575], teaser: 'Jesus\'s base of operations in Galilee. Explore the synagogue ruins.', history: 'A thriving fishing village in the 1st century...', quote: 'Built over the foundations of the synagogue...', verse: 'Matthew 4:13...', img: 'assets/images/capernaum.jpg' },
        'sea-of-galilee': { name: 'Sea of Galilee', coords: [32.82, 35.58], teaser: 'The freshwater lake where Jesus walked on water.', history: 'Setting for many recorded miracles...', quote: ' सेटिंग for both tranquil teachings and miraculous storms.', verse: 'Mark 1:16...', img: 'assets/images/sea-of-galilee.jpg' }
    };

    let map;
    let currentLocKey = null;
    const mainBody = document.getElementById('main-body');

    function truncateString(str) {
        return str.length > 60 ? str.substring(0, 60) + '...' : str;
    }

    // --- NAVIGATION ---
    function nav(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-' + pageId).classList.remove('hidden');
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        
        hideMapPreview();
        if(pageId === 'home') closeItinerary();
        if(pageId === 'map') setTimeout(initMap, 200);
    }

    // --- ITINERARY LOGIC ---
    function openItinerary(tripId) {
        const listContainer = document.getElementById('itinerary-summary-list');
        listContainer.innerHTML = '';
        for (let key in tourData) {
            const loc = tourData[key];
            const summaryCard = document.createElement('div');
            summaryCard.className = 'list-card';
            summaryCard.onclick = () => openGuide(key);
            summaryCard.innerHTML = `
                <img src="${loc.img}" class="list-img">
                <div class="list-details">
                    <h4 style="margin:0;">${loc.name}</h4>
                    <p class="truncate">${truncateString(loc.teaser)}</p>
                </div>
                <div style="padding-right:10px; color:#ccc;">›</div>
            `;
            listContainer.appendChild(summaryCard);
        }
        mainBody.classList.add('itinerary-active');
    }

    function backToJourneys() { mainBody.classList.remove('itinerary-active'); }
    function closeItinerary() { 
        mainBody.classList.remove('itinerary-active'); 
        mainBody.classList.remove('guide-active'); 
    }

    // --- GUIDE LOGIC ---
    function openGuide(locKey) {
        const loc = tourData[locKey];
        document.getElementById('deep-dive-title').innerText = loc.name;
        document.getElementById('deep-dive-hero').src = loc.img;
        document.getElementById('deep-dive-content').innerHTML = `
            <div class="deep-dive-box"><div class="section-h">History</div><p>${loc.history}</p></div>
            <div class="deep-dive-box"><div class="section-h">Reflection</div><p>${loc.quote}</p></div>
            <div class="deep-dive-box"><div class="section-h">Bible</div><div class="verse-block">${loc.verse}</div></div>
            <button onclick="viewOnMap([${loc.coords}], '${locKey}')" class="btn-map-nav">📍 View on Map</button>
        `;
        mainBody.classList.add('guide-active');
    }

    function backToItinerary() { mainBody.classList.remove('guide-active'); }

    // --- MAP LOGIC ---
    function initMap() {
        if(map) { map.invalidateSize(); return; }
        map = L.map('map', { zoomControl: false, tap: true }).setView([32.8, 35.5], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        
        for (let key in tourData) {
            let marker = L.marker(tourData[key].coords).addTo(map);
            marker.on('click', (e) => { 
                L.DomEvent.stopPropagation(e);
                showMapPreview(key); 
            });
        }
        map.on('click', hideMapPreview);
    }

    function showMapPreview(key) {
        currentLocKey = key;
        const loc = tourData[key];
        document.getElementById('preview-name').innerText = loc.name;
        document.getElementById('preview-thumb').src = loc.img;
        document.getElementById('map-preview-card').classList.add('show');
        map.panTo(loc.coords);
    }

    function hideMapPreview() { 
        document.getElementById('map-preview-card').classList.remove('show'); 
        currentLocKey = null;
    }

    function viewOnMap(coords, key) {
        nav('map', document.getElementById('tab-map'));
        setTimeout(() => {
            map.flyTo(coords, 14);
            showMapPreview(key);
        }, 300);
    }

    // --- UPDATED MAP DRILL-DOWN LOGIC ---
function openFullGuideFromMap() {
    // 1. Check if we actually have a location selected
    if (!currentLocKey) {
        console.error("No location selected to open.");
        return;
    }

    // 2. Hide the map preview card immediately
    hideMapPreview();

    // 3. Trigger the existing 'openGuide' function with our active key
    // This re-uses the logic we already built for the home page list
    openGuide(currentLocKey);
    
    // 4. Switch the view back to the Home tab where the Guide lives
    // This ensures the user sees the content we just 'injected'
    nav('home', document.getElementById('tab-home'));
}

    

    // --- STARTUP LOGIC ---
    window.onload = () => {
        closeItinerary();
        nav('home', document.getElementById('tab-home'));
    };
</script>
</body>
</html>
