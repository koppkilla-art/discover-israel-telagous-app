<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sacred Steps | My Journey</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #0038b8; --bg: #f4f7f9; --white: #ffffff; --text: #1a1a1a; --accent: #27ae60; }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* --- Header --- */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: white; border-bottom: 1px solid #eee;
        }
        .app-title { font-weight: 800; font-size: 1.1rem; color: var(--primary); letter-spacing: -0.5px; }
        .user-avatar { width: 32px; height: 32px; background: #e0e0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        /* --- Pages --- */
        .page { height: calc(100vh - 140px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; }

        /* --- Trip Card Styling --- */
        .section-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; }
        .trip-card { 
            background: var(--white); border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #eee;
            margin-bottom: 25px; transition: transform 0.2s;
        }
        .trip-card:active { transform: scale(0.98); }
        .trip-hero { width: 100%; height: 160px; object-fit: cover; }
        .trip-details { padding: 20px; position: relative; }
        .status-pill { 
            position: absolute; top: -15px; right: 20px; background: var(--accent); 
            color: white; padding: 5px 12px; border-radius: 15px; font-size: 10px; font-weight: 800;
        }
        .trip-name { font-size: 1.2rem; font-weight: 700; margin: 0 0 5px 0; }
        .trip-meta { font-size: 13px; color: #666; margin-bottom: 15px; }
        .btn-activate { 
            width: 100%; padding: 12px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-weight: 600; cursor: pointer; 
        }

        /* --- Map Integration --- */
        #map { height: 100%; width: 100%; border-radius: 0; }

        /* --- Bottom Tab Bar --- */
        .tab-bar { 
            position: fixed; bottom: 0; width: 100%; background: white; 
            display: flex; justify-content: space-around; padding: 10px 0 25px 0;
            border-top: 1px solid #eee; z-index: 5000;
        }
        .tab-item { text-align: center; color: #aaa; flex: 1; font-size: 10px; font-weight: 600; }
        .tab-item.active { color: var(--primary); }
        .tab-icon { font-size: 22px; display: block; margin-bottom: 2px; }

        /* --- Info Slide-up --- */
        #info-panel {
            position: fixed; bottom: 0; left: 0; right: 0; background: white;
            height: 50vh; z-index: 6000; border-radius: 25px 25px 0 0;
            padding: 25px; box-shadow: 0 -10px 30px rgba(0,0,0,0.2); display: none;
        }
    </style>
</head>
<body>

<header>
    <div class="app-title">SACRED STEPS</div>
    <div class="user-avatar">JD</div>
</header>

<div id="page-trips" class="page">
    <div class="section-title">My Journeys</div>
    
    <div class="trip-card" onclick="activateTrip('galilee')">
        <img src="https://images.unsplash.com/photo-1552353617-3bfd679b3bdd?w=800" class="trip-hero">
        <div class="trip-details">
            <div class="status-pill">ACTIVE NOW</div>
            <h3 class="trip-name">The Way of the Galilee</h3>
            <p class="trip-meta">3 Days • 5 Locations Unlocked</p>
            <button class="btn-activate">View Map & Guide</button>
        </div>
    </div>

    <div style="opacity: 0.6;">
        <div class="section-title" style="font-size: 1rem;">Upcoming</div>
        <div class="trip-card">
            <div style="padding: 20px;">
                <h3 class="trip-name">Judean Wilderness</h3>
                <p class="trip-meta">Starts Oct 12, 2026</p>
            </div>
        </div>
    </div>
</div>

<div id="page-map" class="page hidden" style="padding:0;">
    <div id="map"></div>
</div>

<div id="info-panel">
    <button onclick="closeInfo()" style="float:right; border:none; background:#f0f0f0; border-radius:50%; width:35px; height:35px;">✕</button>
    <h2 id="loc-title" style="color:var(--primary); margin:0 0 10px 0;"></h2>
    <img id="loc-img" src="" style="width:100%; height:180px; object-fit:cover; border-radius:15px; margin-bottom:15px;">
    <p id="loc-desc" style="line-height:1.6; color:#444;"></p>
</div>

<div class="tab-bar">
    <div id="tab-trips" class="tab-item active" onclick="navTo('trips')">
        <span class="tab-icon">💼</span>Trips
    </div>
    <div id="tab-map" class="tab-item" onclick="navTo('map')">
        <span class="tab-icon">🗺️</span>Explore
    </div>
    <div class="tab-item" onclick="alert('Profile Coming Soon')">
        <span class="tab-icon">👤</span>Account
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Specific Locations for "The Way of the Galilee"
    const galileeLocations = {
        'capernaum': { name: 'Capernaum', coords: [32.8807, 35.5752], desc: 'The base of Jesus\'s ministry. Explore the ancient synagogue and Peter\'s house.', img: 'https://images.unsplash.com/photo-1621255562137-7756f1088737?w=600' },
        'magdala': { name: 'Magdala', coords: [32.8306, 35.5264], desc: 'A wealthy 1st-century port city and the home of Mary Magdalene.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Magdala_Synagogue_2.jpg/800px-Magdala_Synagogue_2.jpg' },
        'sea-of-galilee': { name: 'Sea of Galilee', coords: [32.82, 35.58], desc: 'The freshwater heart of the north. Site of the calling of the disciples.', img: 'https://images.unsplash.com/photo-1552353617-3bfd679b3bdd?w=600' }
    };

    let map;
    let markers = [];

    // 1. Navigation Logic
    function navTo(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-' + page).classList.remove('hidden');
        
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + page).classList.add('active');

        if(page === 'map') {
            setTimeout(initMap, 200);
        }
    }

    // 2. Activate Trip (Switches to map and focuses on Galilee)
    function activateTrip(tripId) {
        if(tripId === 'galilee') {
            navTo('map');
        }
    }

    // 3. Initialize Map with Galilee Pins
    function initMap() {
        if(map) { map.invalidateSize(); return; }
        
        map = L.map('map', { zoomControl: false }).setView([32.85, 35.55], 11);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        for (let key in galileeLocations) {
            let loc = galileeLocations[key];
            let marker = L.marker(loc.coords).addTo(map);
            marker.on('click', () => {
                showInfo(loc);
            });
            markers.push(marker);
        }
    }

    // 4. Show Location Information
    function showInfo(loc) {
        document.getElementById('loc-title').innerText = loc.name;
        document.getElementById('loc-desc').innerText = loc.desc;
        document.getElementById('loc-img').src = loc.img;
        document.getElementById('info-panel').style.display = 'block';
        map.panTo(loc.coords);
    }

    function closeInfo() {
        document.getElementById('info-panel').style.display = 'none';
    }
</script>
</body>
</html>
